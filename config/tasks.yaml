monitor_financial_news:
  description: >
    Search the web and monitor the latest news, updates, and developments
    related to {subject}. Identify the 3 most relevant and impactful news items. Summarize key findings and their potential implications.
    Focus on timeliness, credibility of sources, and relevance to the topic.
  expected_output: >
    A structured summary report with the top news items about {subject},
    including source names, key findings, and their significance.
    Format: numbered list with title, source, and 2-3 sentence summary each.

analyze_market_data:
  description: >
    Using the news summary provided, perform a deeper analysis of {subject}.
    Research market trends, data points, expert opinions, and emerging patterns.
    Use the provided context from previous analysis. Do not call external tools.
    Identify opportunities, risks, and the most compelling angles for content.
  expected_output: >
    A comprehensive analysis report on {subject} covering: current state,
    key trends, notable data points, expert perspectives, risks and
    opportunities. Written as a structured brief for a content team.

seo_strategy:
  description: >
    Develop an SEO strategy for content about {subject}. Research:
    1. Primary keyword and 5-8 secondary/LSI keywords
    2. Search intent (informational / transactional / navigational)
    3. Ideal article structure for ranking (H1, H2, H3 suggestions)
    4. Content gaps competitors are missing
    5. Recommended meta title and meta description (under 160 chars)
    Use Serper to analyze what's currently ranking for this topic.
  expected_output: >
    A complete SEO brief including: primary keyword, secondary keywords,
    search intent classification, recommended article outline with headings,
    meta title, meta description, and 3 content angles that competitors miss.

create_content:
  description: >
    Using all research, analysis, and SEO strategy provided in context,
    create a complete content package about {subject}:
    1. A full blog post (800-1200 words) in markdown format, properly
       structured with SEO headings, introduction, body sections, and
       a strong conclusion with CTA.
    2. A LinkedIn post (professional tone, no excessive emojis, 150-200 words)
    3. A Twitter/X post (punchy, hook-first, under 280 chars, 1-2 hashtags)
    4. An Instagram caption (engaging, storytelling tone, 3-5 relevant hashtags)
    Ensure the content accurately reflects the research findings.
  expected_output: >
    A complete content package: full markdown blog post + 3 social media
    posts (LinkedIn, Twitter, Instagram), each tailored to platform norms.

quality_assurance:
  description: >
    Review and finalize all content about {subject}. Check for:
    - Factual accuracy against the research provided
    - Correct markdown formatting (headers, bullets, links, bold)
    - SEO alignment (primary keyword in title, first paragraph, headings)
    - Each social post matches its platform tone and length
    - Blog post has at least 3 main sections with 2+ paragraphs each
    - No repetitive phrases or filler content
    Make improvements directly. Return the finalized content package.
  expected_output: >
    A finalized, polished content package ready for publishing. Must follow
    the ContentOutput schema exactly: article (markdown string) +
    social_media_posts (list with platform and content fields).